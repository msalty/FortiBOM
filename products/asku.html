<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pricing Dataset Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --border: rgba(0,0,0,0.12);
    --border-mid: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-secondary: #6b6b68;
    --text-tertiary: #9e9e9a;
    --radius-md: 8px;
    --radius-lg: 12px;
    --highlight: rgba(255,200,0,0.3);
    --font: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --text: #e8e8e4;
      --text-secondary: #9e9e9a;
      --text-tertiary: #6b6b68;
      --highlight: rgba(255,200,0,0.2);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  #app {
    max-width: 1200px;
    margin: 0 auto;
  }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--text-secondary); }

  .meta-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .meta-chip {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .meta-chip strong { color: var(--text); font-weight: 500; }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    min-width: 220px;
    height: 36px;
    padding: 0 12px;
    font-size: 14px;
    font-family: var(--font);
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  input[type="text"]::placeholder { color: var(--text-tertiary); }

  select {
    height: 36px;
    padding: 0 10px;
    font-size: 13px;
    font-family: var(--font);
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    min-width: 170px;
  }
  select:focus { border-color: #378add; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .badge {
    display: inline-block;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 2px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .table-wrap {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: auto;
    max-height: calc(100vh - 280px);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }

  col.col-sku    { width: 120px; }
  col.col-product{ width: 160px; }
  col.col-family { width: 150px; }
  col.col-type   { width: 110px; }
  col.col-desc   { width: 240px; }
  col.col-price  { width: 100px; }
  col.col-pillar { width: 100px; }
  col.col-fed    { width: 60px; }
  col.col-erate  { width: 72px; }

  thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 12px;
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 3px; opacity: 0.35; font-style: normal; }
  thead th.sorted { color: var(--text); }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr { border-bottom: 0.5px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-secondary); }

  tbody td {
    padding: 8px 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }
  tbody td.price {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  tbody td.center { text-align: center; }
  .muted { color: var(--text-tertiary); }
  mark { background: var(--highlight); border-radius: 2px; padding: 0 1px; color: inherit; }

  .empty-state {
    padding: 3rem;
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .page-note {
    padding: 10px 12px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-top: 0.5px solid var(--border);
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Pricing dataset search</h1>
    <p>Reading from <code>toolbox_shared</code> IndexedDB — dataset key <code>pricing</code></p>
  </div>

  <div id="meta-bar" class="meta-bar" style="display:none"></div>

  <div class="controls">
    <input type="text" id="search-input" placeholder="Search SKU, product, description, pillar…" oninput="onSearch()" />
    <select id="family-filter" onchange="onSearch()">
      <option value="">All product families</option>
    </select>
    <select id="type-filter" onchange="onSearch()">
      <option value="">All product types</option>
    </select>
  </div>

  <div class="status-bar">
    <span id="result-count" class="badge">Loading…</span>
  </div>

  <div class="table-wrap">
    <table id="results-table">
      <colgroup>
        <col class="col-sku" />
        <col class="col-product" />
        <col class="col-family" />
        <col class="col-type" />
        <col class="col-desc" />
        <col class="col-price" />
        <col class="col-pillar" />
        <col class="col-fed" />
        <col class="col-erate" />
      </colgroup>
      <thead>
        <tr>
          <th onclick="sortBy('SKU')">SKU <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('Product')">Product <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('Product Family Group')">Family <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('Product Type')">Type <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('Description #1')">Description <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('Price')" class="sorted">Price <span class="sort-icon">↑</span></th>
          <th onclick="sortBy('Pillar')">Pillar <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('FED')" title="Federal">FED <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('E-Rate')">E-Rate <span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="9" class="empty-state">Loading data from IndexedDB…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const PAGE = 500;
let allRows = [];
let currentSort = { col: 'Price', dir: 1 };
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open('toolbox_shared', 2);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (db.objectStoreNames.contains('datasets')) db.deleteObjectStore('datasets');
      db.createObjectStore('datasets', { keyPath: 'key' });
    };
    req.onsuccess = (e) => { _db = e.target.result; res(_db); };
    req.onerror = (e) => rej(e.target.error);
  });
}

async function loadPricing() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('datasets', 'readonly');
    const req = tx.objectStore('datasets').get('pricing');
    req.onsuccess = (e) => res(e.target.result || null);
    req.onerror = (e) => rej(e.target.error);
  });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function hi(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function fmtPrice(v) {
  if (v === '' || v == null) return '<span class="muted">—</span>';
  const n = parseFloat(v);
  if (isNaN(n)) return esc(v);
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function filteredRows() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const fam = document.getElementById('family-filter').value;
  const typ = document.getElementById('type-filter').value;
  const fields = ['SKU', 'Identifier', 'Product', 'Product Family Group', 'Product Type',
                  'Description #1', 'Description #2', 'Pillar', 'Item'];

  let rows = allRows.filter(r => {
    if (fam && r['Product Family Group'] !== fam) return false;
    if (typ && r['Product Type'] !== typ) return false;
    if (!q) return true;
    return fields.some(f => (r[f] || '').toLowerCase().includes(q));
  });

  const col = currentSort.col;
  const dir = currentSort.dir;
  rows.sort((a, b) => {
    if (col === 'Price') {
      return dir * ((parseFloat(a[col]) || 0) - (parseFloat(b[col]) || 0));
    }
    return dir * String(a[col] || '').localeCompare(String(b[col] || ''));
  });
  return rows;
}

function renderTable(rows) {
  const q = (document.getElementById('search-input').value || '').trim();
  const tbody = document.getElementById('results-body');
  const count = rows.length;
  document.getElementById('result-count').textContent =
    count.toLocaleString() + ' row' + (count !== 1 ? 's' : '');

  if (count === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No results match your search.</td></tr>';
    return;
  }

  const shown = rows.slice(0, PAGE);
  let html = shown.map(r => `<tr>
    <td title="${esc(r['SKU'])}">${hi(r['SKU'] || '', q)}</td>
    <td title="${esc(r['Product'])}">${hi(r['Product'] || '', q)}</td>
    <td title="${esc(r['Product Family Group'])}">${hi(r['Product Family Group'] || '', q)}</td>
    <td>${hi(r['Product Type'] || '', q)}</td>
    <td title="${esc(r['Description #1'])}">${hi(r['Description #1'] || '', q)}</td>
    <td class="price">${fmtPrice(r['Price'])}</td>
    <td title="${esc(r['Pillar'])}">${hi(r['Pillar'] || '', q)}</td>
    <td class="center">${r['FED'] || '<span class="muted">—</span>'}</td>
    <td class="center">${r['E-Rate'] || '<span class="muted">—</span>'}</td>
  </tr>`).join('');

  if (count > PAGE) {
    html += `<tr><td colspan="9" class="page-note">
      Showing first ${PAGE.toLocaleString()} of ${count.toLocaleString()} results — narrow your search to see more
    </td></tr>`;
  }

  tbody.innerHTML = html;
}

function sortBy(col) {
  if (currentSort.col === col) {
    currentSort.dir *= -1;
  } else {
    currentSort.col = col;
    currentSort.dir = 1;
  }
  document.querySelectorAll('thead th').forEach(th => {
    const thCol = (th.getAttribute('onclick') || '').replace("sortBy('", '').replace("')", '');
    const active = thCol === col;
    th.classList.toggle('sorted', active);
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = active ? (currentSort.dir === 1 ? '↑' : '↓') : '↕';
  });
  renderTable(filteredRows());
}

function onSearch() {
  renderTable(filteredRows());
}

async function init() {
  try {
    const record = await loadPricing();
    if (!record || !record.data || !record.data.rows) {
      document.getElementById('results-body').innerHTML =
        '<tr><td colspan="9" class="empty-state">No pricing data found. Import a price list first.</td></tr>';
      document.getElementById('result-count').textContent = '0 rows';
      return;
    }

    allRows = record.data.rows;

    const mb = document.getElementById('meta-bar');
    mb.style.display = 'flex';
    mb.innerHTML = `
      <div class="meta-chip">Dataset: <strong>${esc(record.data.name || 'Fortinet Price List')}</strong></div>
      <div class="meta-chip">Effective: <strong>${esc(record.data.effectiveDate || '—')}</strong></div>
      <div class="meta-chip">Rows: <strong>${allRows.length.toLocaleString()}</strong></div>
      <div class="meta-chip">Source: <strong>${esc(record.source?.filename || record.source?.type || '—')}</strong></div>
    `;

    const families = [...new Set(allRows.map(r => r['Product Family Group']).filter(Boolean))].sort();
    const types = [...new Set(allRows.map(r => r['Product Type']).filter(Boolean))].sort();

    const famSel = document.getElementById('family-filter');
    families.forEach(f => {
      const o = document.createElement('option');
      o.value = f; o.textContent = f;
      famSel.appendChild(o);
    });

    const typSel = document.getElementById('type-filter');
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      typSel.appendChild(o);
    });

    renderTable(filteredRows());
  } catch (err) {
    document.getElementById('results-body').innerHTML =
      `<tr><td colspan="9" class="empty-state">Error reading IndexedDB: ${esc(err.message)}</td></tr>`;
    document.getElementById('result-count').textContent = 'Error';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
